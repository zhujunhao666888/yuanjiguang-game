<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>原继光大冒险</title>
<style>
body { margin:0; overflow:hidden; background:black; color:white; font-family:sans-serif;}

#menu { position:absolute; top:30%; width:100%; text-align:center;}
button { padding:10px 20px; margin:10px; font-size:18px;}

#ui { position:absolute; display:none; width:100%; height:100%;}

#attack { position:absolute; right:20px; bottom:20px; font-size:20px;}

canvas { background:#4CAF50; display:block; }

/* 血条 */
.bar {
    position:absolute;
    width:200px;
    height:20px;
    background:#555;
}
#playerBar { top:10px; left:10px;}
#bossBar { top:40px; left:10px;}

.fill {
    height:100%;
    background:red;
}

.text {
    position:absolute;
    width:100%;
    text-align:center;
    top:0;
    left:0;
    font-size:14px;
    color:white;
    line-height:20px;
}

/* 摇杆 */
#joystickBase {
    position:absolute;
    left:20px;
    bottom:20px;
    width:100px;
    height:100px;
    background:rgba(255,255,255,0.2);
    border-radius:50%;
}

#joystickStick {
    position:absolute;
    left:35px;
    top:35px;
    width:30px;
    height:30px;
    background:white;
    border-radius:50%;
}
</style>
</head>

<body>

<div id="menu">
<h1 id="title">原继光大冒险</h1>
<button onclick="startGame()" id="startBtn">开始游戏</button><br>
<button onclick="setLang('cn')">简体中文</button>
<button onclick="setLang('tw')">繁體中文</button><br>
<button onclick="exitGame()" id="exitBtn">退出游戏</button>
</div>

<div id="ui">
<!-- 血条 -->
<div class="bar" id="playerBar">
    <div class="fill" id="playerFill"></div>
    <div class="text" id="playerText"></div>
</div>

<div class="bar" id="bossBar">
    <div class="fill" id="bossFill"></div>
    <div class="text" id="bossText"></div>
</div>

<button id="attack" onclick="attack()">攻击</button>

<!-- 摇杆 -->
<div id="joystickBase">
    <div id="joystickStick"></div>
</div>

<canvas id="game" width="400" height="600"></canvas>
</div>

<script>
let lang = "cn";

const text = {
    cn:{title:"原继光大冒险",start:"开始游戏",exit:"退出游戏",attack:"攻击",win:"🎉 你击败了Boss！",lose:"💀 你失败了"},
    tw:{title:"原繼光大冒險",start:"開始遊戲",exit:"退出遊戲",attack:"攻擊",win:"🎉 你擊敗了Boss！",lose:"💀 你失敗了"}
};

function updateText(){
    title.innerText = text[lang].title;
    startBtn.innerText = text[lang].start;
    exitBtn.innerText = text[lang].exit;
    attack.innerText = text[lang].attack;
}
function setLang(l){ lang=l; updateText(); }
function exitGame(){ alert("已退出"); }

let player = {x:50,y:300,hp:500,max:500};
let boss = {x:300,y:300,hp:1000,max:1000};

let ctx, gameStarted=false;

function startGame(){
    menu.style.display="none";
    ui.style.display="block";
    ctx = game.getContext("2d");
    gameStarted=true;
    loop();
}

function attack(){
    if(Math.abs(player.x - boss.x)<60){
        boss.hp-=50;
        if(boss.hp<=0){ alert(text[lang].win); location.reload(); }
    }
}

// 🎮 摇杆控制
let joystick = document.getElementById("joystickBase");
let stick = document.getElementById("joystickStick");
let moving=false, dx=0;

joystick.addEventListener("touchstart", ()=> moving=true);

joystick.addEventListener("touchend", ()=>{
    moving=false;
    stick.style.left="35px";
    dx=0;
});

joystick.addEventListener("touchmove", function(e){
    let rect = joystick.getBoundingClientRect();
    let x = e.touches[0].clientX - rect.left - 50;

    x = Math.max(-40, Math.min(40, x));
    stick.style.left = (x+50-15)+"px";

    dx = x/40;
});

// 游戏循环
function loop(){
    if(!gameStarted) return;

    // 移动
    if(moving){
        player.x += dx*3;
    }

    // Boss攻击
    if(Math.abs(player.x - boss.x)<60){
        player.hp -= 0.5;
        if(player.hp<=0){ alert(text[lang].lose); location.reload(); }
    }

    // 更新血条
    playerFill.style.width = (player.hp/player.max*100)+"%";
    bossFill.style.width = (boss.hp/boss.max*100)+"%";

    // ✅ 血量数字显示
    playerText.innerText = Math.floor(player.hp) + " / " + player.max;
    bossText.innerText = boss.hp + " / " + boss.max;

    // 绘制
    ctx.clearRect(0,0,400,600);

    ctx.fillStyle="blue";
    ctx.fillRect(player.x, player.y, 30, 30);

    ctx.fillStyle="red";
    ctx.fillRect(boss.x, boss.y-20, 60, 60);

    requestAnimationFrame(loop);
}

updateText();
</script>

</body>
</html>
